<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKSH Inventory Audit System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container-welcome {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 60px 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #0f3460;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 36px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
        }
        
        .feature-list {
            text-align: left;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .feature-list li {
            color: #333;
            margin-bottom: 12px;
            font-size: 15px;
        }
        
        .feature-list li:before {
            content: "✓ ";
            color: #16a085;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }
        
        .btn-access {
            flex: 1;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-scanner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-scanner:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-reports {
            background: linear-gradient(135deg, #16a085 0%, #0f3460 100%);
            color: white;
        }
        
        .btn-reports:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(22, 160, 133, 0.4);
        }
        
        .footer-text {
            margin-top: 30px;
            font-size: 13px;
            color: #999;
        }
        
        .demo-credentials {
            background: #fffbeb;
            border: 1px solid #fcd34d;
            border-radius: 8px;
            padding: 15px;
            margin-top: 30px;
            text-align: left;
        }
        
        .demo-credentials h6 {
            color: #0f3460;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .demo-credentials p {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .demo-credentials code {
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
            color: #16a085;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container-welcome">
        <div class="logo">📦</div>
        <h1>DAKSH</h1>
        <p class="subtitle">Professional Inventory Audit & Management System</p>
        
        <div class="feature-list">
            <ul style="list-style: none;">
                <li>Real-time Inventory Tracking</li>
                <li>Advanced Audit Reports</li>
                <li>User Management & Security</li>
                <li>Bin Wise Stock Management</li>
                <li>Multi-Dealer Support</li>
                <li>Price Variance Analysis</li>
            </ul>
        </div>
        
        <div class="button-group">
            <a href="Daksh.html" class="btn-access btn-scanner" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">🚀 Enter Dashboard</a>
        </div>
    </div>
    
    <script>
        // Automatically redirect to the main Daksh application
        window.location.href = 'Daksh.html';
    </script>
</body>
</html>
